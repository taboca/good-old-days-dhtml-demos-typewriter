<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Netscape 6 Welcome Viewer</title>
  <style>
    :root {
      --zoom: 1;
      --rotate-x: 43deg;
      --rotate-y: 10deg;
      --rotate-z: -15deg;
      --perspective: 1050px;
      --content-width: 606px;
      --content-height: 464px;
      --scaled-content-width: 606px;
      --scaled-content-height: 464px;
      --shell-bg: #7f9aa6;
      --panel-bg: #d2dde0;
      --panel-border-dark: #566e77;
      --panel-border-light: #f2ffff;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--shell-bg);
      color: #16252b;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .viewer {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 286px;
    }

    .toolbar {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      min-height: 100vh;
      padding: 8px;
      border-left: 1px solid var(--panel-border-light);
      border-right: 1px solid var(--panel-border-dark);
      background: var(--panel-bg);
      box-sizing: border-box;
      overflow-y: auto;
    }

    .tool-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      flex: 0 0 auto;
    }

    .tool-group + .tool-group {
      padding-top: 8px;
      border-top: 1px solid #a5b7bd;
    }

    .icon-button {
      width: 30px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border: 2px outset #9aaeb5;
      background: #dbe6e9;
      padding: 0;
      color: #132e37;
      cursor: pointer;
    }

    .icon-button.is-active {
      border-style: inset;
      background: #b8cbd1;
    }

    .icon-button:active {
      border-style: inset;
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .zoom-range {
      width: 180px;
      accent-color: #557886;
    }

    .tilt-range {
      width: 126px;
      accent-color: #557886;
    }

    .depth-range {
      width: 146px;
      accent-color: #557886;
    }

    .readout {
      width: 54px;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .viewport {
      grid-column: 1;
      grid-row: 1;
      overflow: auto;
      background: #91aab4;
      box-sizing: border-box;
      display: grid;
      place-items: safe center;
      padding: 22px;
    }

    .content-square {
      position: relative;
      width: var(--scaled-content-width);
      height: var(--scaled-content-height);
      margin: auto;
      background: transparent;
      box-sizing: content-box;
      overflow: visible;
      perspective: var(--perspective);
      perspective-origin: 50% 42%;
      transform-style: preserve-3d;
    }

    .content-plane {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--content-width);
      height: var(--content-height);
      overflow: hidden;
      background: #ffffff;
      transform: scale(var(--zoom)) rotateX(var(--rotate-x)) rotateY(var(--rotate-y)) rotateZ(var(--rotate-z));
      transform-origin: center center;
      transform-style: preserve-3d;
      transition: transform 120ms ease-out;
    }

    .content-plane.is-exploding {
      overflow: visible;
      background: transparent;
    }

    .source-measure {
      position: absolute;
      left: -10000px;
      top: -10000px;
      width: var(--content-width);
      height: var(--content-height);
      pointer-events: none;
      visibility: hidden;
    }

    .stage-backdrop,
    .normalized-layer {
      position: absolute;
      left: 0;
      top: 0;
      transform-style: preserve-3d;
      backface-visibility: visible;
      will-change: transform;
    }

    .stage-backdrop {
      width: var(--content-width);
      height: var(--content-height);
      background: #ffffff;
      pointer-events: none;
    }

  </style>
</head>
<body>
  <main class="viewer">
    <aside class="toolbar" aria-label="Viewer controls">
      <div class="tool-group">
        <button class="icon-button explode-button" type="button" data-action="explode" aria-pressed="false" aria-label="Toggle detach animation" title="Toggle detach animation">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3l7 4-7 4-7-4z" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <path d="M5 12l7 4 7-4M5 17l7 4 7-4" fill="none" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
        <input class="depth-range" type="range" min="0" max="160" step="1" value="0" aria-label="Detach spacing">
        <div class="readout depth-value" aria-live="polite">Z 0</div>
      </div>

      <div class="tool-group">
        <button class="icon-button" type="button" data-action="zoom-out" aria-label="Zoom out" title="Zoom out">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M6.5 10h7" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
            <path d="M15 15l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
          </svg>
        </button>
        <input class="zoom-range" type="range" min="50" max="220" step="5" value="100" aria-label="Zoom level">
        <button class="icon-button" type="button" data-action="zoom-in" aria-label="Zoom in" title="Zoom in">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10" cy="10" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M6.5 10h7" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
            <path d="M10 6.5v7" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
            <path d="M15 15l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
          </svg>
        </button>
        <button class="icon-button" type="button" data-action="reset-zoom" aria-label="Reset zoom" title="Reset zoom">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 8h8a5 5 0 1 1-3.8 8.3" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M6 8l4-4M6 8l4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
          </svg>
        </button>
        <div class="readout zoom-value" aria-live="polite">100%</div>
      </div>

      <div class="tool-group">
        <input class="tilt-range rotate-x-range" type="range" min="-70" max="70" step="1" value="43" aria-label="Rotate X">
        <div class="readout rotate-x-value" aria-live="polite">X 43</div>
        <input class="tilt-range rotate-y-range" type="range" min="-70" max="70" step="1" value="10" aria-label="Rotate Y">
        <div class="readout rotate-y-value" aria-live="polite">Y 10</div>
        <input class="tilt-range rotate-z-range" type="range" min="-180" max="180" step="1" value="-15" aria-label="Rotate Z">
        <div class="readout rotate-z-value" aria-live="polite">Zr -15</div>
        <input class="tilt-range perspective-range" type="range" min="400" max="2800" step="50" value="1050" aria-label="Perspective">
        <div class="readout perspective-value" aria-live="polite">P 1050</div>
        <button class="icon-button" type="button" data-action="reset-3d" aria-label="Reset 3D view" title="Reset 3D view">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3l7 4v9l-7 5-7-5V7z" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <path d="M5 7l7 4 7-4M12 11v10" fill="none" stroke="currentColor" stroke-width="1.8"/>
          </svg>
        </button>
      </div>

    </aside>

    <div class="viewport">
      <div class="content-square">
        <div class="content-plane"></div>
      </div>
    </div>
    <div class="source-measure" aria-hidden="true"></div>
  </main>
  <script src="./viewer.js"></script>
</body>
</html>
